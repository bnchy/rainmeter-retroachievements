[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
@IncludeVariables=#@#Variables.inc

[Metadata]
Name=RetroAchievements
Information=Recent RetroAchievements unlocks as a card grid on an iOS-style glass background. First run: click the setup lines to enter your username and Web API key (retroachievements.org -> Settings -> Keys).
Version=2.1

; content sits on a 16px (x) / 14px (y) padding inside the glass card

; =================================================================
; MEASURES
; =================================================================

; Decides between setup mode (missing credentials) and normal mode
[MeasureSetup]
Measure=String
String=#UserName#|#APIKey#
UpdateDivider=-1
IfMatch=^\||\|$
IfMatchAction=[!ShowMeterGroup Setup][!HideMeterGroup Main][!Redraw]
IfNotMatchAction=[!ShowMeterGroup Main][!HideMeterGroup Setup][!EnableMeasure MeasureRecent][!EnableMeasure MeasureProfile][!Redraw]

[MeasureRecent]
Measure=WebParser
ForceReload=1
Url=https://retroachievements.org/API/API_GetUserRecentAchievements.php?u=#UserName#&y=#APIKey#&m=#RecentMinutes#
RegExp=(?s)^(.*)$
StringIndex=1
UpdateRate=#UpdateRate#
CodePage=65001
Disabled=1
FinishAction=[!CommandMeasure MeasureScript "Parse()"]
OnConnectErrorAction=[!Log "RA: achievements fetch failed (connection)" Error]
OnRegExpErrorAction=[!Log "RA: achievements fetch failed (regexp)" Error]

[MeasureProfile]
Measure=WebParser
ForceReload=1
Url=https://retroachievements.org/API/API_GetUserProfile.php?u=#UserName#&y=#APIKey#
RegExp=(?si)"User":"(.*?)".*?"UserPic":"(.*?)".*?"TotalPoints":(\d+)
UpdateRate=#UpdateRate#
CodePage=65001
Disabled=1
FinishAction=[!UpdateMeasure MeasureProfilePoints][!CommandMeasure MeasureScript "ProfileDone()"]

[MeasureProfilePoints]
Measure=WebParser
ForceReload=1
Url=[MeasureProfile]
StringIndex=3
UpdateDivider=-1

; -- serial game icon downloader (driven by RA.lua, one at a time) --
; Url + DownloadFile are set per-download by the script; files persist
; in @Resources\DownloadFile\ so each icon is fetched at most once.

[MeasureIconDL]
Measure=WebParser
ForceReload=1
Url=
Download=1
UpdateRate=1000000
FinishAction=[!CommandMeasure MeasureScript "IconDone()"]
OnDownloadErrorAction=[!CommandMeasure MeasureScript "IconFail()"]
OnConnectErrorAction=[!CommandMeasure MeasureScript "IconFail()"]

[MeasureProbe]
Measure=WebParser
ForceReload=1
Url=https://retroachievements.org/API/API_GetUserProfile.php?u=#UserName#&y=#APIKey#
RegExp=(?s)^(.*)$
StringIndex=1
CodePage=65001
FinishAction=[!CommandMeasure MeasureScript "ProbeDone()"]

[MeasureScript]
Measure=Script
ScriptFile=#@#Scripts\RA.lua
UpdateDivider=-1

; -- input fields for first-run setup -----------------------------

[InputUser]
Measure=Plugin
Plugin=InputText
X=136
Y=52
W=220
H=18
SolidColor=30,30,30,240
FontColor=#TextColor#
FontFace=#BodyFont#
FontSize=10
FocusDismiss=1
DefaultValue=""
Command1=[!WriteKeyValue Variables UserName "$UserInput$" "#@#Variables.inc"][!Refresh]

[InputKey]
Measure=Plugin
Plugin=InputText
X=136
Y=78
W=250
H=18
SolidColor=30,30,30,240
FontColor=#TextColor#
FontFace=#BodyFont#
FontSize=10
Password=1
FocusDismiss=1
DefaultValue=""
Command1=[!WriteKeyValue Variables APIKey "$UserInput$" "#@#Variables.inc"][!Refresh]

; =================================================================
; STYLES
; =================================================================

[StyleText]
FontFace=#BodyFont#
FontColor=#TextColor#
FontSize=10
AntiAlias=1
Group=Main
Hidden=1

[StyleDim]
FontFace=#BodyFont#
FontColor=#DimColor#
FontSize=8
AntiAlias=1
Group=Main
Hidden=1

[StyleCardTitle]
FontFace=#BodyFont#
FontColor=#TextColor#
FontSize=9
AntiAlias=1
W=((#SkinWidth#/6)-58)
H=14
ClipString=1
SolidColor=0,0,0,1
Group=Main
Hidden=1

[StyleCardMeta]
FontFace=#BodyFont#
FontColor=#DimColor#
FontSize=8
AntiAlias=1
W=((#SkinWidth#/6)-58)
H=13
ClipString=1
Group=Main
Hidden=1

[StyleSetup]
FontFace=#BodyFont#
FontColor=#TextColor#
FontSize=10
AntiAlias=1
Group=Setup
Hidden=1

; =================================================================
; METERS - BACKGROUND (always visible)
; =================================================================

[MeterBackground]
Meter=Shape
X=0
Y=0
Shape=Rectangle 0,0,(#SkinWidth#+32),#BgHeight#,#BgRadius# | Fill Color #BgColor# | StrokeWidth 1 | Stroke Color #BgStroke#

; =================================================================
; METERS - SETUP MODE
; =================================================================

[MeterSetupTitle]
Meter=String
MeterStyle=StyleSetup
FontFace=#HeaderFont#
FontColor=#AccentColor#
FontSize=13
X=16
Y=14
Text=RETROACHIEVEMENTS

[MeterSetupUser]
Meter=String
MeterStyle=StyleSetup
X=16
Y=54
Text=USERNAME  -  click to type
LeftMouseUpAction=[!CommandMeasure InputUser "ExecuteBatch 1"]

[MeterSetupUserVal]
Meter=String
MeterStyle=StyleSetup
FontColor=#AccentColor#
X=236
Y=54
Text=#UserName#
DynamicVariables=1

[MeterSetupKey]
Meter=String
MeterStyle=StyleSetup
X=16
Y=80
Text=WEB API KEY  -  click to type
LeftMouseUpAction=[!CommandMeasure InputKey "ExecuteBatch 1"]

[MeterSetupHint]
Meter=String
MeterStyle=StyleSetup
FontColor=#DimColor#
FontSize=8
X=16
Y=112
Text=Get your key at retroachievements.org -> Settings -> Keys  (click to open)
LeftMouseUpAction=["https://retroachievements.org/settings"]

; =================================================================
; METERS - MAIN MODE
; =================================================================

; -- header: username left, scores right --------------------------

[MeterName]
Meter=String
MeterStyle=StyleText
FontFace=#HeaderFont#
FontSize=13
StringCase=Upper
X=16
Y=14
Text=#UserName#
DynamicVariables=1
LeftMouseUpAction=["https://retroachievements.org/user/#UserName#"]

[MeterPoints]
Meter=String
MeterStyle=StyleText
StringAlign=Right
X=(#SkinWidth#+16)
Y=17
Text=... PTS
LeftMouseUpAction=["https://retroachievements.org/user/#UserName#"]

; -- order by control ---------------------------------------------

[MeterOrderLabel]
Meter=String
MeterStyle=StyleDim
X=16
Y=50
Text=ORDER BY :

[MeterOrderValue]
Meter=String
MeterStyle=StyleDim
FontColor=#AccentColor#
X=78
Y=50
Text=DATE
SolidColor=0,0,0,1
LeftMouseUpAction=[!CommandMeasure MeasureScript "CycleSort()"]
ToolTipText=Click to cycle: date / points / game

[MeterOrderDir]
Meter=String
MeterStyle=StyleDim
FontColor=#AccentColor#
X=126
Y=50
Text=v
SolidColor=0,0,0,1
Padding=4,0,4,0
LeftMouseUpAction=[!CommandMeasure MeasureScript "ToggleDir()"]
ToolTipText=Click to flip direction

; -- refresh / edit -----------------------------------------------

[MeterRefresh]
Meter=String
MeterStyle=StyleDim
StringAlign=Right
X=(#SkinWidth#+16)
Y=50
Text=REFRESH
LeftMouseUpAction=[!CommandMeasure MeasureRecent "Update"][!CommandMeasure MeasureProfile "Update"]
MouseOverAction=[!SetOption MeterRefresh FontColor #AccentColor#][!UpdateMeter MeterRefresh][!Redraw]
MouseLeaveAction=[!SetOption MeterRefresh FontColor #DimColor#][!UpdateMeter MeterRefresh][!Redraw]

[MeterEdit]
Meter=String
MeterStyle=StyleDim
StringAlign=Right
X=(#SkinWidth#-44)
Y=50
Text=EDIT
LeftMouseUpAction=["notepad.exe" "#@#Variables.inc"]
MouseOverAction=[!SetOption MeterEdit FontColor #AccentColor#][!UpdateMeter MeterEdit][!Redraw]
MouseLeaveAction=[!SetOption MeterEdit FontColor #DimColor#][!UpdateMeter MeterEdit][!Redraw]

; -- status -------------------------------------------------------

[MeterStatus]
Meter=String
MeterStyle=StyleDim
FontSize=9
X=16
Y=80
Text=Loading...

; -- card grid: 6 columns x 2 rows, positions derived from SkinWidth
